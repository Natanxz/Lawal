<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Dlawals</title>
    <link rel="shortcut icon" href="../dlwl_t.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-highlight: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --btn-grey: #404040;
        }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; padding-top: 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background-color: #000000; border-bottom: 1px solid var(--border-color); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-img { width: 28px; height: 28px; object-fit: contain; }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1.5px; color: #ffffff; }
        
        .profile-container { max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid var(--border-color); border-radius: 8px; display: none; }
        .profile-header { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
        
        .info-group { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .info-label { color: var(--text-muted); font-size: 14px; }
        .info-value { font-weight: 500; font-size: 15px; }
        
        .btn { padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; border: 1px solid var(--border-color); background: transparent; color: #fff; cursor: pointer; }
        .btn:hover { background-color: #171717; border-color: var(--text-highlight); }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .popup-overlay.active { opacity: 1; pointer-events: auto; }
        .popup-box { background-color: #0a0a0a; border: 1px solid var(--border-color); width: 90%; max-width: 400px; padding: 25px; border-radius: 8px; text-align: center; }
        .popup-title { font-family: 'Orbitron', sans-serif; font-size: 18px; margin-bottom: 15px; letter-spacing: 1px; }
        .popup-input { width: 100%; padding: 10px; margin-bottom: 12px; background: #000; border: 1px solid var(--border-color); color: #fff; border-radius: 4px; font-size: 14px; }
        .popup-input:focus { border-color: var(--text-highlight); outline: none; }
        .popup-error { color: #ef4444; font-size: 12px; margin-bottom: 10px; display: none; }
        .popup-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }

        .btn-logout { background-color: #ef4444; border-color: #ef4444; width: 100%; margin-top: 30px; display: none; }
        .btn-logout:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="window.location.href='forum.html'">
            <img src="../dlwl_t.png" alt="Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </div>
    </header>

    <div class="profile-container" id="profileView">
        <div class="profile-header">
            <img src="" alt="Avatar" id="displayAvatar" class="profile-avatar">
            <button class="btn" id="btnEditAvatar" style="display:none;">Edit Foto URL</button>
        </div>
        <div class="info-group">
            <div>
                <p class="info-label">Display Name</p>
                <p class="info-value" id="displayNick">-</p>
            </div>
            <button class="btn" id="btnEditNick" style="display:none;">Edit</button>
        </div>
        <div class="info-group">
            <div>
                <p class="info-label">Username</p>
                <p class="info-value" id="displayUser">-</p>
            </div>
            <button class="btn" id="btnEditUser" style="display:none;">Edit</button>
        </div>
        <div class="info-group" id="passwordGroup" style="display:none;">
            <div>
                <p class="info-label">Keamanan</p>
                <p class="info-value">Password (Tersembunyi)</p>
            </div>
            <button class="btn" id="btnEditPass">Ubah</button>
        </div>
        
        <button class="btn btn-logout" id="btnLogout">LOGOUT AKUN</button>
    </div>

    <div class="popup-overlay" id="editPopup">
        <div class="popup-box">
            <h3 class="popup-title" id="editTitle">EDIT DATA</h3>
            <div class="popup-error" id="editError"></div>
            <input type="text" id="editNewValue" class="popup-input" placeholder="Data baru">
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
            <p style="color: var(--text-muted); font-size:11px; text-align:left; margin-bottom:8px;">Konfirmasi Keamanan:</p>
            <input type="password" id="confirmPass" class="popup-input" placeholder="Password Lama/Saat ini">
            <div class="popup-buttons">
                <button class="btn" id="btnCancelEdit">Batal</button>
                <button class="btn" style="background: var(--btn-grey);" id="btnSaveEdit">Simpan</button>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
