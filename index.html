<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dlawals</title>
    <!-- Favicon / Ikon Tab Browser -->
    <link rel="shortcut icon" href="dlwl_t.png" type="image/png">
    
    <!-- Google Fonts: Orbitron untuk Logo, Inter untuk Teks Utama -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;       /* Hitam Pekat */
            --text-color: #ffffff;     /* Putih Solid */
            --text-highlight: #a3a3a3; /* Abu-abu Terang untuk Highlight */
            --text-muted: #737373;     /* Abu-abu Sedang */
            --border-color: #262626;   /* Abu-abu Gelap untuk Garis */
            --btn-grey: #404040;       /* Abu-abu untuk Button */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffffff;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 8% 60px 8%;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            line-height: 1.3;
            margin-bottom: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .hero-title span {
            color: var(--text-highlight);
        }

        .hero-description {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- IMAGE CONTAINER (16:8 Ratio) --- */
        .image-container {
            width: 100%;
            max-width: 680px;
            aspect-ratio: 16 / 8;
            margin: 0 auto 35px auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            background-color: #171717;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }

        .image-container img:hover {
            filter: grayscale(0%);
        }

        /* --- BUTTONS --- */
        .cta-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--btn-grey);
            color: #ffffff;
            border: 1px solid var(--btn-grey);
        }

        .btn-primary:hover {
            background-color: #525252;
            border-color: #525252;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #171717;
            border-color: var(--text-highlight);
        }

        /* --- POP-UP / MODAL STYLE --- */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px); /* Efek blur di latar belakang */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* Class aktif untuk memunculkan popup via JS */
        .popup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-box {
            background-color: #0a0a0a;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            position: relative;
            transform: scale(0.85);
            transition: transform 0.4s ease;
        }

        .popup-overlay.active .popup-box {
            transform: scale(1);
        }

        .popup-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .popup-title span {
            color: var(--text-highlight);
        }

        .popup-img-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            background-color: #171717;
            margin-bottom: 18px;
        }

        .popup-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .popup-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .popup-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            header {
                padding: 15px 5%;
            }

            .nav-links {
                display: none;
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-description {
                font-size: 13px;
            }

            .btn {
                width: 100%;
                max-width: 280px;
            }

            .popup-buttons {
                flex-direction: column;
                align-items: center;
            }
            .popup-buttons .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER / NAVIGATION -->
    <header>
        <div class="logo-container">
            <img src="dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </div>
    </header>

    <!-- POP-UP AWAL (MODAL) -->
    <div class="popup-overlay" id="welcomePopup">
        <div class="popup-box">
            <!-- Judul Pop-up -->
            <h2 class="popup-title">Update <span>Dlawals</span></h2>
            
            <!-- Gambar Pop-up -->
            <div class="popup-img-container">
                <img src="/images/ayano.png" alt="Dlawals Update Image">
            </div>
            
            <!-- Text Deskripsi -->
            <p class="popup-text">
                Ada event baru nih <strong>ClassIQ</strong>! Kalau mau ikut, lihat WhatsApp woy.
            </p>
            
            <!-- Tombol Aksi -->
            <div class="popup-buttons">
                <a href="./page/classiq.html" class="btn btn-primary">Buka Classiq</a>
                <button class="btn btn-secondary" id="closePopupBtn">Lewati</button>
            </div>
        </div>
    </div>

    <!-- HERO SECTION (HALAMAN UTAMA / PENGENALAN) -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Selamat datang di <span>Dlawals</span></h1>
            <p class="hero-description">
                Selamat datang di dunia lawals. Di mana semuanya dimulai. Tempat yang berisikan momen dan update terbaru mengenai komunitas aneh ini.
            </p>

            <!-- GAMBAR DENGAN RASIO 16:8 -->
            <div class="image-container">
                <img src="/images/classiq.png" alt="Main Hero Image">
            </div>

            <!-- TOMBOL AKSI DENGAN LINK BARU -->
            <div class="cta-buttons">
                <a href="./comunity_page/forum.html" class="btn btn-primary">Forum Komunitas</a>
                <a href="./page/comunity.html" class="btn btn-secondary">Lihat Komunitas</a>
            </div>
        </div>
    </section>

    <!-- SCRIPT UNTUK POP-UP -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const popup = document.getElementById("welcomePopup");
            const closeBtn = document.getElementById("closePopupBtn");

            // Memunculkan pop-up otomatis saat halaman selesai dimuat
            setTimeout(() => {
                popup.classList.add("active");
            }, 300); // delay tipis 300ms agar transisinya halus saat halaman terbuka

            // Menutup pop-up saat tombol 'Lewati' diklik
            closeBtn.addEventListener("click", () => {
                popup.classList.remove("active");
            });

            // Menutup pop-up jika user klik area gelap di luar box pop-up
            popup.addEventListener("click", (e) => {
                if (e.target === popup) {
                    popup.classList.remove("active");
                }
            });
        });
    </script>

</body>
</html>
