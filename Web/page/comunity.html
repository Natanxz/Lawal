<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dlawals - Comunity</title>
    <link rel="shortcut icon" href="../dlwl_t.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-highlight: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --btn-grey: #404040;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 8% 60px 8%;
        }

        .page-header {
            margin-bottom: 40px;
            text-align: left;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-highlight);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 15px;
        }

        .community-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .community-card {
            background-color: #050505;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s ease;
        }

        .community-card:hover {
            border-color: var(--text-muted);
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 16 / 8;
            overflow: hidden;
            background-color: #171717;
            border-bottom: 1px solid var(--border-color);
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }

        .community-card:hover .card-thumbnail img {
            filter: grayscale(0%);
        }

        /* Tata letak konten body kartu */
        .card-body {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center; /* Sejajar vertikal di tengah */
            gap: 20px;
        }

        /* Kolom Teks (Judul & Deskripsi) */
        .card-text-side {
            flex: 1;
            min-width: 0; /* Mencegah teks merusak layout flex */
        }

        .card-title {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        /* Container Pembatas Gerakan Teks */
        .card-desc-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap; /* Teks dipaksa satu baris agar bisa bergeser */
        }

        .card-desc {
            display: inline-block;
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            transition: transform 0.5s ease;
        }

        /* Efek Teks Bergerak saat Kartu Di-hover */
        .community-card:hover .card-desc {
            animation: geserTeks 8s linear infinite;
        }

        @keyframes geserTeks {
            0% { transform: translateX(0); }
            50% { transform: translateX(-35%); } /* Bergeser ke kiri menunjukkan sisa teks */
            100% { transform: translateX(0); }
        }

        /* Kolom Button */
        .card-btn-side {
            flex-shrink: 0; /* Menjaga ukuran tombol tetap stabil */
        }

        .btn-action {
            display: inline-block;
            padding: 10px 24px;
            background-color: var(--btn-grey);
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .btn-action:hover {
            background-color: #525252;
        }

        @media (max-width: 600px) {
            main {
                padding-top: 100px;
            }

            .page-title {
                font-size: 20px;
            }
            
            .card-body {
                padding: 16px 20px;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
