<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class IQ - IPB</title>
    <link rel="shortcut icon" href="../dlwl_t.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-highlight: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --card-bg: #050505;
            --btn-grey: #404040;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 8% 60px 8%;
        }

        .page-header {
            margin-bottom: 40px;
            text-align: left;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-highlight);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* --- FALLBACK VIEW (TIDAK ADA SOAL) --- */
        .fallback-view {
            text-align: center;
            padding: 80px 20px;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
        }

        .fallback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-highlight);
            margin-bottom: 10px;
        }

        .fallback-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* --- QUIZ CONTAINER & QUESTION CARDS --- */
        .quiz-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            border-color: var(--text-muted);
            background-color: #0c0c0c;
        }

        /* Radio Input Styling */
        .option-item input[type="radio"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            outline: none;
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            background-color: transparent;
        }

        .option-item input[type="radio"]::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: scale(0);
            transition: 0.1s transform ease-in-out;
            background-color: #ffffff;
        }

        .option-item input[type="radio"]:checked::before {
            transform: scale(1);
        }

        .option-item input[type="radio"]:checked {
            border-color: #ffffff;
        }

        /* --- SUBMIT BUTTON --- */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--btn-grey);
            color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #525252;
            border-color: var(--text-highlight);
        }

        /* --- MODAL POPUP --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            border-color: var(--text-highlight);
        }

        .modal-btn-row {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .btn-confirm {
            background-color: #ffffff;
            color: #000000;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-muted);
        }

        /* Output JSON untuk update Manual (Sangat Membantu Dev) */
        .dev-output {
            margin-top: 20px;
            background-color: #080808;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .dev-output p {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .dev-code {
            font-family: monospace;
            font-size: 11px;
            color: #5cff9c;
            white-space: pre-wrap;
            user-select: all;
        }

        @media (max-width: 600px) {
            main {
                padding-top: 100px;
            }

            .page-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo-container">
            <img src="../dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </a>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">IPB Class</h1>
        </div>

        <div id="mainContent">
            <!-- Loading State -->
            <div class="fallback-view">
                <h2 class="fallback-title">Memuat Tugas...</h2>
            </div>
        </div>
    </main>

    <!-- MODAL POPUP (UID INPUT) -->
    <div class="modal-overlay" id="uidModal">
        <div class="modal-card">
            <h3 class="modal-title" id="modalTitle">Verifikasi Member</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;" id="modalDesc">
                Masukkan UID milikmu untuk mencatat skor ke dalam database.
            </p>
            <input type="text" id="uidInput" class="modal-input" placeholder="Contoh: nael01" autocomplete="off">
            <div class="modal-btn-row" id="modalBtnRow">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Batal</button>
                <button class="modal-btn btn-confirm" onclick="submitQuizData()">Kirim Jawaban</button>
            </div>
            <div id="devResult" style="display: none;"></div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        let quizData = null;
        let userData = null;
        let answeredUids = [];

        document.addEventListener("DOMContentLoaded", () => {
            loadQuizAndUsers();
        });

        // Load data soal dan user dari file lokal JSON
        async function loadQuizAndUsers() {
            const mainContent = document.getElementById("mainContent");
            try {
                // Ambil data soal
                const quizRes = await fetch("ipb.json");
                if (!quizRes.ok) throw new Error("File ipb.json tidak ditemukan");
                quizData = await quizRes.json();

                // Ambil data member
                const userRes = await fetch("user.json");
                if (userRes.ok) {
                    userData = await userRes.json();
                }

                // Ambil log UID yang sudah menjawab dari localStorage untuk simulasi database anti curang
                const savedAnsweredUids = localStorage.getItem(`answered_${quizData.quizId}`);
                answeredUids = savedAnsweredUids ? JSON.parse(savedAnsweredUids) : (quizData.answeredUids || []);

                renderQuiz();
            } catch (err) {
                console.error(err);
                renderFallback();
            }
        }

        // Tampilkan fallack jika file json tidak ada / error
        function renderFallback() {
            const mainContent = document.getElementById("mainContent");
            mainContent.innerHTML = `
                <div class="fallback-view">
                    <h2 class="fallback-title">Tidak ada soal</h2>
                    <p class="fallback-desc">Tunggu guru memberikan tugas berikutnya.</p>
                </div>
            `;
        }

        // Tampilkan soal jika pemuatan JSON berhasil
        function renderQuiz() {
            const mainContent = document.getElementById("mainContent");
            if (!quizData || !quizData.questions || quizData.questions.length === 0) {
                renderFallback();
                return;
            }

            let html = `<form class="quiz-form" id="quizForm" onsubmit="handleFormSubmit(event)">`;

            quizData.questions.forEach((q, qIndex) => {
                html += `
                    <div class="question-card">
                        <h2 class="question-text">${q.id}. ${escapeHtml(q.question)}</h2>
                        <div class="options-list">
                `;

                q.options.forEach((opt, optIndex) => {
                    html += `
                        <label class="option-item">
                            <input type="radio" name="q_${q.id}" value="${optIndex}" required>
                            <span>${escapeHtml(opt)}</span>
                        </label>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            html += `
                <button type="submit" class="submit-btn">Jawab</button>
            </form>`;

            mainContent.innerHTML = html;
        }

        // Mencegah XSS injection
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Aksi ketika form di-submit
        function handleFormSubmit(e) {
            e.preventDefault();
            // Semua soal divalidasi 'required' via HTML radio, buka modal input UID
            document.getElementById("uidModal").style.display = "flex";
            document.getElementById("uidInput").focus();
        }

        function closeModal() {
            document.getElementById("uidModal").style.display = "none";
            document.getElementById("uidInput").value = "";
        }

        // Proses kalkulasi nilai dan simulasi penyimpanan database
        function submitQuizData() {
            const uidInput = document.getElementById("uidInput").value.trim().toLowerCase();
            const modalTitle = document.getElementById("modalTitle");
            const modalDesc = document.getElementById("modalDesc");
            const modalBtnRow = document.getElementById("modalBtnRow");
            const devResult = document.getElementById("devResult");

            if (!uidInput) {
                alert("Harap masukkan UID terlebih dahulu.");
                return;
            }

            // Validasi: Periksa apakah UID terdaftar di user.json (bila file user.json sukses di-load)
            let userMatch = null;
            if (userData) {
                userMatch = userData.find(u => u.uid.toLowerCase() === uidInput);
                if (!userMatch) {
                    alert("UID tidak ditemukan! Pastikan kamu adalah member Dlawals.");
                    return;
                }
            }

            // Validasi Anti Curang: Periksa apakah UID ini sudah mengumpulkan tugas ini sebelumnya
            if (answeredUids.includes(uidInput)) {
                alert("Sistem Keamanan: Kamu sudah pernah menjawab tugas ini sebelumnya!");
                closeModal();
                return;
            }

            // Hitung nilai jawaban benar
            let correctCount = 0;
            const form = document.getElementById("quizForm");

            quizData.questions.forEach(q => {
                const selectedOpt = form.querySelector(`input[name="q_${q.id}"]:checked`);
                if (selectedOpt && parseInt(selectedOpt.value) === q.answer) {
                    correctCount++;
                }
            });

            // Hitung skor akhir skala 100
            const totalQuestions = quizData.questions.length;
            const finalScore = Math.round((correctCount / totalQuestions) * 100);

            // Simpan UID pengumpul baru ke database simulasi (localStorage browser)
            answeredUids.push(uidInput);
            localStorage.setItem(`answered_${quizData.quizId}`, JSON.stringify(answeredUids));

            // Perbarui skor user (simulasi data internal)
            if (userMatch) {
                userMatch.score += finalScore; // Tambah akumulasi skor
            }

            // --- DEVELOVER OUTPUT ZONE ---
            // Karena web ini statis, kode di bawah akan mempermudah kamu selaku dev untuk meng-update file ipb.json dan user.json asli kamu dengan cara copas.
            const updatedIpbJson = { ...quizData, answeredUids: answeredUids };
            const updatedUserJson = userData ? userData : [];

            modalTitle.innerText = "Tugas Terkirim!";
            modalDesc.innerHTML = `Terima kasih <strong>${userMatch ? userMatch.name : uidInput}</strong>!<br>Jawaban benar: ${correctCount}/${totalQuestions}<br>Skor tugas ini: <strong>${finalScore}</strong>`;
            modalBtnRow.style.display = "none";
            document.getElementById("uidInput").style.display = "none";

            // Tampilkan data JSON baru untuk disalin Developer
            devResult.style.display = "block";
            devResult.innerHTML = `
                <div class="dev-output">
                    <p>&darr; Salin dan timpa isi file <b>user.json</b> milikmu:</p>
                    <div class="dev-code">${JSON.stringify(updatedUserJson, null, 2)}</div>
                </div>
                <div class="dev-output">
                    <p>&darr; Salin dan timpa isi file <b>ipb.json</b> milikmu:</p>
                    <div class="dev-code">${JSON.stringify(updatedIpbJson, null, 2)}</div>
                </div>
                <button class="modal-btn btn-confirm" style="margin-top: 15px; width: 100%;" onclick="window.location.reload()">Selesai & Muat Ulang</button>
            `;
        }
    </script>

</body>
</html>
