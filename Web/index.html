<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dlawals</title>
    <!-- Favicon / Ikon Tab Browser -->
    <link rel="shortcut icon" href="dlwl_t.png" type="image/png">
    
    <!-- Google Fonts: Orbitron untuk Logo, Inter untuk Teks Utama -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;       /* Hitam Pekat */
            --text-color: #ffffff;     /* Putih Solid */
            --text-highlight: #a3a3a3; /* Abu-abu Terang untuk Highlight */
            --text-muted: #737373;     /* Abu-abu Sedang */
            --border-color: #262626;   /* Abu-abu Gelap untuk Garis */
            --btn-grey: #404040;       /* Abu-abu untuk Button */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff; /* Putih Solid tanpa gradient */
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffffff;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 8% 60px 8%;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            line-height: 1.3;
            margin-bottom: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        /* Highlight text menggunakan warna abu-abu */
        .hero-title span {
            color: var(--text-highlight);
        }

        .hero-description {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- IMAGE CONTAINER (16:8 Ratio) --- */
        .image-container {
            width: 100%;
            max-width: 680px;
            aspect-ratio: 16 / 8; /* Menjaga rasio gambar tetap 16:8 */
            margin: 0 auto 35px auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            background-color: #171717;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); /* Efek hitam-putih agar menyatu dengan tema */
            transition: filter 0.3s ease;
        }

        .image-container img:hover {
            filter: grayscale(0%); /* Gambar berwarna kembali saat diarahkan kursor */
        }

        /* --- BUTTONS --- */
        .cta-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--btn-grey);
            color: #ffffff;
            border: 1px solid var(--btn-grey);
        }

        .btn-primary:hover {
            background-color: #525252; /* Abu-abu sedikit lebih terang */
            border-color: #525252;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #171717;
            border-color: var(--text-highlight);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            header {
                padding: 15px 5%;
            }

            .nav-links {
                display: none; /* Menu atas disederhanakan untuk tampilan HP */
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-description {
                font-size: 13px;
            }

            .btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER / NAVIGATION -->
    <header>
        <div class="logo-container">
            <img src="dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </div>
    </header>

    <!-- HERO SECTION (HALAMAN UTAMA / PENGENALAN) -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Selamat datang di <span>Dlawals</span></h1>
            <p class="hero-description">
                Selamat datang di dunia lawals. Di mana semuanya dimulai. Tempat yang berisikan momen dan update terbaru mengenai komunitas aneh ini.
            </p>

            <!-- GAMBAR DENGAN RASIO 16:8 -->
            <div class="image-container">
                <!-- Menggunakan gambar bertema gaming dari Unsplash sebagai contoh -->
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200&q=80" alt="Dlawals Gaming Hub">
            </div>

            <!-- TOMBOL AKSI DENGAN LINK BARU -->
            <div class="cta-buttons">
                <a href="./medsos/medsos.html" class="btn btn-primary">Media Sosial</a>
                <a href="./page/comunity.html" class="btn btn-secondary">Lihat Komunitas</a>
            </div>
        </div>
    </section>

</body>
</html>
