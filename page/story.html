<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dlawals - Stories</title>
    <link rel="shortcut icon" href="../dlwl_t.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-highlight: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --card-bg: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 8% 60px 8%;
        }

        .page-header {
            margin-bottom: 40px;
            text-align: left;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-highlight);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* --- STORY GRID --- */
        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        /* --- STORY CARD (PORTRAIT 9:16) --- */
        .story-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .story-card:hover {
            border-color: var(--text-muted);
            transform: translateY(-4px);
        }

        /* Poster Wrapper 9:16 */
        .card-poster {
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            background-color: #171717;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .story-card:hover .card-poster img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* Detail Cerita di Bawah Poster */
        .card-details {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .story-title {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
            /* Membatasi teks judul maksimal 2 baris */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .story-author {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* --- STYLE UNTUK COMING SOON CARD --- */
        .story-card.coming-soon {
            cursor: default;
            opacity: 0.6;
        }

        .story-card.coming-soon:hover {
            border-color: var(--border-color);
            transform: none;
        }

        /* Overlay gelap & teks "Coming Soon" */
        .coming-soon-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .coming-soon-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-highlight);
            text-transform: uppercase;
            border: 1px solid var(--text-muted);
            padding: 6px 12px;
            border-radius: 4px;
        }

        .story-card.coming-soon:hover .card-poster img {
            filter: grayscale(100%);
            transform: none;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 600px) {
            main {
                padding-top: 100px;
            }

            .page-title {
                font-size: 20px;
            }

            .story-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 16px;
            }

            .card-details {
                padding: 12px;
            }

            .story-title {
                font-size: 13px;
            }

            .coming-soon-text {
                font-size: 10px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo-container">
            <img src="../dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </a>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">Story Page</h1>
        </div>

        <div class="story-grid">

            <!-- ========================================== -->
            <!-- SESI 1 (STORY AKTIF - BISA DIDUPLIKAT) -->
            <!-- ========================================== -->
            <a href="../stories/rxk/rxk.html" class="story-card">
                <div class="card-poster">
                    <!-- Gunakan poster portrait (rasio 9:16) -->
                    <img src="../images/kxr.jpg">
                </div>
                <div class="card-details">
                    <h2 class="story-title">R x K</h2>
                    <p class="story-author">by Rio</p>
                </div>
            </a>
            <!-- ========================================== -->
            <!-- AKHIR SESI 1 -->
            <!-- ========================================== -->


            <!-- ========================================== -->
            <!-- SESI COMING SOON (BISA DIDUPLIKAT) -->
            <!-- ========================================== -->
            <div class="story-card coming-soon">
                <div class="card-poster">
                    <div class="coming-soon-overlay">
                        <span class="coming-soon-text">Coming Soon</span>
                    </div>
                    <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=500&q=80" alt="Coming Soon Cover">
                </div>
                <div class="card-details">
                    <h2 class="story-title">Coming Project</h2>
                    <p class="story-author">by ?</p>
                </div>
            </div>
            <!-- ========================================== -->
            <!-- AKHIR SESI COMING SOON -->
            <!-- ========================================== -->

        </div>
    </main>

</body>
</html>
