<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dlawals - PSR</title>
    <!-- Favicon (Naik 2 folder ke root) -->
    <link rel="shortcut icon" href="../../dlwl_t.png" type="image/png">
    
    <!-- Google Fonts: Orbitron & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-highlight: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --card-bg: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        /* --- MAIN CONTAINER --- */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 8% 60px 8%;
        }

        /* --- STORY HEADER (INFO UTAMA) --- */
        .story-header {
            display: flex;
            gap: 32px;
            margin-bottom: 40px;
            align-items: flex-start;
        }

        /* Cover Portrait */
        .story-cover {
            width: 180px;
            aspect-ratio: 9 / 13;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #171717;
            flex-shrink: 0;
        }

        .story-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Metadata Cerita */
        .story-metadata {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 8px;
        }

        .story-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .story-author {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .story-author span {
            color: #ffffff;
            font-weight: 600;
        }

        /* --- GENRE BAGAN --- */
        .genre-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .genre-tag {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-highlight);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            background-color: var(--card-bg);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- SECTION BLOCKS (SINOPSIS & CHAPTERS) --- */
        .section-block {
            margin-bottom: 35px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-highlight);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 16px;
        }

        .synopsis-text {
            font-size: 14px;
            color: var(--text-highlight);
            line-height: 1.7;
        }

        /* --- CHAPTER LIST --- */
        .chapter-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Item List Chapter */
        .chapter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s ease, transform 0.1s ease;
        }

        .chapter-item:hover {
            border-color: var(--text-muted);
            transform: translateX(2px);
        }

        .chapter-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .chapter-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 600px) {
            main {
                padding-top: 100px;
            }

            .story-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 20px;
            }

            .story-cover {
                width: 150px;
            }

            .story-title {
                font-size: 24px;
            }

            .genre-container {
                justify-content: center;
            }

            .chapter-item {
                padding: 14px 16px;
            }

            .chapter-name {
                font-size: 13px;
            }

            .chapter-date {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../index.html" class="logo-container">
            <img src="../../dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </a>
    </header>

    <main>
        <!-- STORY HEADER (INFO UTAMA) -->
        <section class="story-header">
            <div class="story-cover">
                <!-- Cover Gambar R x K (Naik 2 folder ke root) -->
                <img src="../../images/psr.png" alt="PSR Cover">
            </div>
            <div class="story-metadata">
                <h1 class="story-title">Perjuangan Segs Remake</h1>
                <p class="story-author">by <span>Rio</span></p>
                
                <!-- BAGAN GENRE -->
                <div class="genre-container">
                    <span class="genre-tag">Drama</span>
                    <span class="genre-tag">Romance</span>
                    <span class="genre-tag">Fantasy</span>
                    <span class="genre-tag">Canon</span>
                    <span class="genre-tag">Shounen</span>
                    <span class="genre-tag">18+</span>
                    <span class="genre-tag">Crawlers</span>
                </div>
            </div>
        </section>

        <!-- BAGAN SINOPSIS -->
        <section class="section-block">
            <h2 class="section-title">Sinopsis</h2>
            <div class="synopsis-text">
                <p>
                    Cerita remake dari <strong>Perjuangan Segs</strong>
                </p>
            </div>
        </section>

        <!-- BAGAN CHAPTER -->
        <section class="section-block">
            <h2 class="section-title">Chapters</h2>
            <div class="chapter-container">

                <!-- ========================================== -->
                <!-- SESI CHAPTER -->
                <!-- ========================================== -->
                <a href="ch1.html" class="chapter-item">
                    <span class="chapter-name">Arc I - Chapter 1</span>
                    <span class="chapter-date">7 Sept 2024</span>
                </a>

                <a href="ch2.html" class="chapter-item">
                    <span class="chapter-name">Arc I - Chapter 2</span>
                    <span class="chapter-date">7 Sept 2024</span>
                </a>
                
                <a href="ch3.html" class="chapter-item">
                    <span class="chapter-name">Arc I - Chapter 3</span>
                    <span class="chapter-date">7 Sept 2024</span>
                </a>
                
                <a href="ch4.html" class="chapter-item">
                    <span class="chapter-name">Arc I - Chapter 4</span>
                    <span class="chapter-date">7 Sept 2024</span>
                </a>
                <!-- ========================================== -->
                <!-- AKHIR SESI CHAPTER -->
                <!-- ========================================== -->
            </div>
        </section>
    </main>

</body>
</html>
