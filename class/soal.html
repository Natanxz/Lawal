<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class IQ - Kerjakan Tugas</title>
    <link rel="shortcut icon" href="../dlwl_t.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root { --bg-color: #000000; --text-color: #ffffff; --text-highlight: #a3a3a3; --text-muted: #737373; --border-color: #262626; --card-bg: #050505; --btn-grey: #404040; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background-color: #000000; border-bottom: 1px solid var(--border-color); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { width: 28px; height: 28px; object-fit: contain; }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1.5px; color: #ffffff; }
        main { max-width: 800px; margin: 0 auto; padding: 120px 8% 60px 8%; }
        
        .page-header { margin-bottom: 40px; text-align: left; }
        .page-title { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-highlight); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }

        .paragraph-card { background-color: #0c0c0c; border-left: 3px solid var(--text-highlight); padding: 20px; margin-bottom: 24px; font-size: 15px; line-height: 1.6; color: #e0e0e0; white-space: pre-line; }
        .question-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 24px; margin-bottom: 24px; }
        .question-text { font-size: 16px; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; transition: all 0.2s ease; }
        .option-item:hover { border-color: var(--text-muted); background-color: #0c0c0c; }
        .option-item input[type="radio"] { appearance: none; width: 16px; height: 16px; border: 1px solid var(--text-muted); border-radius: 50%; outline: none; display: inline-grid; place-content: center; cursor: pointer; background-color: transparent; }
        .option-item input[type="radio"]::before { content: ""; width: 8px; height: 8px; border-radius: 50%; transform: scale(0); transition: 0.1s transform ease-in-out; background-color: #ffffff; }
        .option-item input[type="radio"]:checked::before { transform: scale(1); }
        .option-item input[type="radio"]:checked { border-color: #ffffff; }

        .submit-btn { display: block; width: 100%; padding: 16px; background-color: var(--btn-grey); color: #ffffff; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s ease; margin-top: 20px; }
        .submit-btn:hover { background-color: #525252; border-color: var(--text-highlight); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; width: 100%; max-width: 450px; padding: 30px; text-align: center; }
        .modal-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .modal-input { width: 100%; padding: 12px; background-color: #000000; border: 1px solid var(--border-color); border-radius: 4px; color: #ffffff; font-size: 14px; text-align: center; outline: none; margin-bottom: 20px; }
        .modal-input:focus { border-color: var(--text-highlight); }
        .modal-btn-row { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 4px; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-color); }
        .btn-confirm { background-color: #ffffff; color: #000000; }
        .btn-cancel { background-color: transparent; color: var(--text-muted); }

        .fallback-view { text-align: center; padding: 80px 20px; border: 1px dashed var(--border-color); border-radius: 8px; }
        .fallback-title { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--text-highlight); margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="assignment.html" class="logo-container">
            <img src="../dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </a>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title" id="assignmentTitle">Memuat Tugas...</h1>
        </div>

        <div id="mainContent">
            <div class="fallback-view">
                <h2 class="fallback-title">Sedang mengambil data...</h2>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="uidModal">
        <div class="modal-card">
            <h3 class="modal-title" id="modalTitle">Verifikasi Member</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;" id="modalDesc">
                Masukkan UID milikmu untuk mencatat skor ke database.
            </p>
            <input type="text" id="uidInput" class="modal-input" placeholder="Contoh: nael01" autocomplete="off">
            <div class="modal-btn-row" id="modalBtnRow">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Batal</button>
                <button class="modal-btn btn-confirm" onclick="processQuizSubmission()">Kirim Jawaban</button>
            </div>
        </div>
    </div>

    <script>
        let currentAssignmentId = null;
        let questionCounter = 0; // Untuk ID internal pertanyaan 

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentAssignmentId = urlParams.get('id');
            if(!currentAssignmentId) {
                renderError("ID Tugas tidak ditemukan.");
            } else {
                loadAssignment();
            }
        });

        async function loadAssignment() {
            try {
                const res = await fetch(`/api/assignments/${currentAssignmentId}`);
                const data = await res.json();
                
                if(!data.success) return renderError(data.message);
                
                document.getElementById("assignmentTitle").innerText = data.assignment.title;
                renderContent(data.assignment.items);

            } catch (error) {
                renderError("Koneksi gagal saat memuat tugas.");
            }
        }

        function renderError(msg) {
            document.getElementById("mainContent").innerHTML = `
                <div class="fallback-view">
                    <h2 class="fallback-title">${msg}</h2>
                    <p style="color: var(--text-muted); font-size:14px;">Silakan kembali ke halaman Assignment.</p>
                </div>
            `;
            document.getElementById("assignmentTitle").innerText = "Error";
        }

        function renderContent(items) {
            const container = document.getElementById("mainContent");
            if (!items || items.length === 0) return renderError("Tugas kosong.");

            let html = `<form id="quizForm" onsubmit="handleFormSubmit(event)">`;
            
            questionCounter = 0;

            items.forEach((item) => {
                if(item.type === 'paragraph') {
                    html += `<div class="paragraph-card">${escapeHtml(item.text)}</div>`;
                } else if(item.type === 'question') {
                    // Beri penomoran manual pada internal UI (q_0, q_1 dst sesuai index)
                    const qId = questionCounter++;
                    html += `
                        <div class="question-card">
                            <h2 class="question-text">${questionCounter}. ${escapeHtml(item.question)}</h2>
                            <div class="options-list">
                    `;
                    item.options.forEach((opt, optIndex) => {
                        html += `
                            <label class="option-item">
                                <input type="radio" name="q_${qId}" value="${optIndex}" required>
                                <span>${escapeHtml(opt)}</span>
                            </label>
                        `;
                    });
                    html += `</div></div>`;
                }
            });

            html += `<button type="submit" class="submit-btn">Kirim Jawaban</button></form>`;
            container.innerHTML = html;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            document.getElementById("uidModal").style.display = "flex";
            document.getElementById("uidInput").focus();
        }

        function closeModal() {
            document.getElementById("uidModal").style.display = "none";
            document.getElementById("uidInput").value = "";
        }

        async function processQuizSubmission() {
            const uid = document.getElementById("uidInput").value.trim().toLowerCase();
            if (!uid) return alert("Harap masukkan UID!");

            const form = document.getElementById("quizForm");
            const answers = {};
            
            // Collect jawaban 
            for(let i=0; i<questionCounter; i++) {
                const selectedOpt = form.querySelector(`input[name="q_${i}"]:checked`);
                if (selectedOpt) answers[`q_${i}`] = selectedOpt.value;
            }

            try {
                const res = await fetch('/api/submit-assignment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, answers, assignmentId: currentAssignmentId })
                });

                const result = await res.json();
                if (!result.success) return alert(result.message);

                document.getElementById("modalTitle").innerText = "Tugas Terkirim!";
                document.getElementById("modalDesc").innerHTML = `
                    Selamat <strong>${result.name}</strong>!<br>
                    Tepat: ${result.correctCount} / ${result.totalQuestions}<br>
                    Skor: <strong>${result.score}</strong>
                `;
                
                document.getElementById("uidInput").style.display = "none";
                document.getElementById("modalBtnRow").innerHTML = `
                    <button class="modal-btn btn-confirm" style="width:100%;" onclick="window.location.href='assignment.html'">Selesai</button>
                `;

            } catch (err) {
                alert("Gagal menghubungi server!");
            }
        }

        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    </script>
</body>
</html>
