<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class IQ - IPB</title>
    <link rel="shortcut icon" href="../dlwl_t.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-highlight: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --card-bg: #050505;
            --btn-grey: #404040;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #000000;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 8% 60px 8%;
        }

        .page-header {
            margin-bottom: 40px;
            text-align: left;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-highlight);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .fallback-view {
            text-align: center;
            padding: 80px 20px;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
        }

        .fallback-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-highlight);
            margin-bottom: 10px;
        }

        .fallback-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        .quiz-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            border-color: var(--text-muted);
            background-color: #0c0c0c;
        }

        .option-item input[type="radio"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            outline: none;
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            background-color: transparent;
        }

        .option-item input[type="radio"]::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: scale(0);
            transition: 0.1s transform ease-in-out;
            background-color: #ffffff;
        }

        .option-item input[type="radio"]:checked::before {
            transform: scale(1);
        }

        .option-item input[type="radio"]:checked {
            border-color: #ffffff;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--btn-grey);
            color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #525252;
            border-color: var(--text-highlight);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            border-color: var(--text-highlight);
        }

        .modal-btn-row {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .btn-confirm {
            background-color: #ffffff;
            color: #000000;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            main {
                padding-top: 100px;
            }
            .page-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo-container">
            <img src="../dlwl_t.png" alt="Dlawals Logo" class="logo-img">
            <span class="logo-text">DLAWALS</span>
        </a>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">IPB Class</h1>
        </div>

        <div id="mainContent">
            <div class="fallback-view">
                <h2 class="fallback-title">Memuat Tugas...</h2>
            </div>
        </div>
    </main>

    <!-- MODAL POPUP -->
    <div class="modal-overlay" id="uidModal">
        <div class="modal-card">
            <h3 class="modal-title" id="modalTitle">Verifikasi Member</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;" id="modalDesc">
                Masukkan UID milikmu untuk mencatat skor ke dalam database secara otomatis.
            </p>
            <input type="text" id="uidInput" class="modal-input" placeholder="Contoh: nael01" autocomplete="off">
            <div class="modal-btn-row" id="modalBtnRow">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Batal</button>
                <button class="modal-btn btn-confirm" onclick="processQuizSubmission()">Kirim Jawaban</button>
            </div>
        </div>
    </div>

    <!-- PISAHKAN LOGIKA JS KE FILE EKSTERNAL -->
    <script src="ipb.js" defer></script>

</body>
</html>
